<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Envase | HUGO PIETRO</title>
        <link rel="icon" href="{{ url_for('static', filename='hp-logo-only.svg') }}" type="image/x-icon">

        {% include 'shared/header/hp-header.html' %}

        <div class="form-login">
            <div class="split-horizontal">
                <h1>Calendário de Envase</h1>
                <div style="display: flex; margin-top: 10px">
                    <img class="svg-gray" src="{{ url_for('static', filename='svg/xmark.svg') }}" alt="" onclick="window.location.href='{{ url_for('envase') }}';">
                </div>
            </div>
            <div id="calendar-container"></div>
        </div>
<script>

    function generateCalendar(year, month) {
        const calendarContainer = document.getElementById('calendar-container');
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();

        let html = '<table class="calendar"><thead><tr><th>DOM</th><th>SEG</th><th>TER</th><th>QUA</th><th>QUI</th><th>SEX</th><th>SAB</th></tr></thead><tbody>';

        let day = 1;
        for (let i = 0; i < 6; i++) {
            html += '<tr>';
            for (let j = 0; j < 7; j++) {
                if ((i === 0 && j < firstDay) || day > daysInMonth) {
                    html += '<td class="calendar"></td>';
                } else {
                    const date = new Date(year, month, day);
                    const weekendClass = date.getDay() === 0 || date.getDay() === 6 ? 'weekend' : '';
                    html += `<td class="calendar ${weekendClass}" data-date="${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}">${day}</td>`;
                    day++;
                }
            }
            html += '</tr>';
            if (day > daysInMonth) break;
        }

        html += '</tbody></table>';
        calendarContainer.innerHTML = html;
    }

    const today = new Date();
    generateCalendar(today.getFullYear(), today.getMonth());

    document.addEventListener('DOMContentLoaded', function() {
        var dataEnvL1 = [
            {% for item in envase %}
                {% if item['linha'] == 1 %}
                    '{{ item.data_envase }}',
                {% endif %}
            {% endfor %}
        ];
        var dataEnvL2 = [
            {% for item in envase %}
                {% if item['linha'] == 2 %}
                    '{{ item.data_envase }}',
                {% endif %}
            {% endfor %}
        ];
        var dataEnvL3 = [
            {% for item in envase %}
                {% if item['linha'] == 3 %}
                    '{{ item.data_envase }}',
                {% endif %}
            {% endfor %}
        ];
        var dataEnvL4 = [
            {% for item in envase %}
                {% if item['linha'] == 4 %}
                    '{{ item.data_envase }}',
                {% endif %}
            {% endfor %}
        ];

        const calendario = document.getElementById('calendar-container');
        const cells = calendario.querySelectorAll('td');

        cells.forEach(cell => {
            const data = cell.dataset.date;
            const linha1 = dataEnvL1.includes(data);
            const linha2 = dataEnvL2.includes(data);
            const linha3 = dataEnvL3.includes(data);
            const linha4 = dataEnvL4.includes(data);
    
            if (linha1 || linha2 || linha3 || linha4) {
                const linhasComEvento = [];
                if (linha1) linhasComEvento.push('programmed-l1');
                if (linha2) linhasComEvento.push('programmed-l2');
                if (linha3) linhasComEvento.push('programmed-l3');
                if (linha4) linhasComEvento.push('programmed-l4');

                const flexContainer = document.createElement('div');
                flexContainer.classList.add('flex-container');

                linhasComEvento.forEach(linhaClass => {
                    const sessionContainer = document.createElement('div');
                    sessionContainer.classList.add('session-container', linhaClass);
                    flexContainer.appendChild(sessionContainer);
                });

                cell.appendChild(flexContainer);
            }
        });
    });
</script>
