<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Estilo para o tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="center-page">
    <div id="meu-loop">
        <script>
            for (let i = 1; i <= 5; i++) {
                const item = document.createElement("span");
                item.textContent = `Item ${i}`;
                item.classList.add("tooltip");

                const tooltip = document.createElement("span");
                tooltip.classList.add("tooltiptext");
                tooltip.textContent = `Tooltip para o Item ${i}`;

                item.appendChild(tooltip);
                document.getElementById("meu-loop").appendChild(item);
            }
        </script>
    </div>
</div>
</body>
</html>
